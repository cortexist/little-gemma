<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="640" viewBox="0 0 1000 640" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect x="6" y="6" width="988" height="628" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="36" y="50" font-size="25" font-weight="700" fill="#0f172a">Decode attention — block count vs. walk length</text>
  <text x="36" y="76" font-size="13.5" fill="#64748b">One generated token attends over a 512-key KV cache (one head). The math is identical — the gap is how that KV walk is split across the GPU's SMs.</text>

  <!-- flow key -->
  <rect x="36" y="96" width="928" height="40" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="52" y="121" font-size="11.5" font-weight="700" fill="#94a3b8">PER-STEP FLOW</text>
  <text x="168" y="121" font-size="13" fill="#334155">query q + K,V rows</text>
  <line x1="300" y1="116" x2="342" y2="116" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="352" y="121" font-size="13" fill="#334155">each block → partial (m, l, O)</text>
  <line x1="540" y1="116" x2="582" y2="116" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="592" y="121" font-size="13" fill="#334155">combine (LSE merge)</text>
  <line x1="742" y1="116" x2="784" y2="116" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="794" y="121" font-size="13" font-weight="600" fill="#0f172a">attn out</text>

  <!-- ============ PANEL 1: BEFORE ============ -->
  <text x="36" y="184" font-size="16" font-weight="700" fill="#dc2626">BEFORE · little-gemma</text>
  <text x="235" y="184" font-size="13.5" fill="#475569" font-family="ui-monospace, Consolas, monospace">SPLIT_KEYS = 1024  →  n_split = &#8968;512 / 1024&#8969; = 1</text>

  <text x="52" y="228" font-size="13" fill="#334155">query q</text>
  <line x1="110" y1="223" x2="196" y2="223" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#ar)"/>

  <rect x="200" y="202" width="620" height="44" rx="7" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="510" y="229" text-anchor="middle" font-size="13.5" fill="#991b1b">block 0  ·  walks keys 0 … 511</text>

  <line x1="200" y1="266" x2="820" y2="266" stroke="#dc2626" stroke-width="2" marker-end="url(#arR)"/>
  <text x="510" y="285" text-anchor="middle" font-size="12.5" fill="#dc2626">one block walks the full depth — serial, length = T</text>

  <text x="838" y="221" font-size="12.5" fill="#64748b">1 partial</text>
  <text x="838" y="238" font-size="12.5" fill="#64748b">→ out</text>

  <rect x="200" y="300" width="620" height="28" rx="14" fill="#fef2f2" stroke="#fecaca"/>
  <text x="510" y="319" text-anchor="middle" font-size="12.5" font-weight="600" fill="#b91c1c">per-block work &#8733; depth  ·  −14.3% droop (shallow → deep)  ·  8 blocks leave 56 of 64 SMs idle (A5000)</text>

  <line x1="36" y1="352" x2="964" y2="352" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ============ PANEL 2: AFTER ============ -->
  <text x="36" y="390" font-size="16" font-weight="700" fill="#16a34a">AFTER · SPLIT_KEYS = 64</text>
  <text x="270" y="390" font-size="13.5" fill="#475569" font-family="ui-monospace, Consolas, monospace">and llama.cpp (nbatch_fa = 128)  →  n_split grows with depth</text>

  <text x="52" y="432" font-size="13" fill="#334155">query q</text>
  <line x1="110" y1="427" x2="196" y2="427" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#ar)"/>

  <!-- 8 cells -->
  <g font-size="12" fill="#14532d" text-anchor="middle">
    <rect x="200" y="406" width="74" height="44" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/><text x="237" y="426">b0</text><text x="237" y="441" font-size="10" fill="#4d7c0f">&#8804;64</text>
    <rect x="278" y="406" width="74" height="44" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/><text x="315" y="426">b1</text><text x="315" y="441" font-size="10" fill="#4d7c0f">&#8804;64</text>
    <rect x="356" y="406" width="74" height="44" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/><text x="393" y="426">b2</text><text x="393" y="441" font-size="10" fill="#4d7c0f">&#8804;64</text>
    <rect x="434" y="406" width="74" height="44" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/><text x="471" y="426">b3</text><text x="471" y="441" font-size="10" fill="#4d7c0f">&#8804;64</text>
    <rect x="512" y="406" width="74" height="44" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/><text x="549" y="426">b4</text><text x="549" y="441" font-size="10" fill="#4d7c0f">&#8804;64</text>
    <rect x="590" y="406" width="74" height="44" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/><text x="627" y="426">b5</text><text x="627" y="441" font-size="10" fill="#4d7c0f">&#8804;64</text>
    <rect x="668" y="406" width="74" height="44" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/><text x="705" y="426">b6</text><text x="705" y="441" font-size="10" fill="#4d7c0f">&#8804;64</text>
    <rect x="746" y="406" width="74" height="44" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/><text x="783" y="426">b7</text><text x="783" y="441" font-size="10" fill="#4d7c0f">&#8804;64</text>
  </g>
  <text x="864" y="425" font-size="12" fill="#16a34a">8 blocks,</text>
  <text x="864" y="441" font-size="12" fill="#16a34a">parallel</text>

  <!-- converge to combine -->
  <path d="M510,450 L510,470" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arG)"/>
  <text x="524" y="465" font-size="11.5" fill="#4d7c0f">8 partials (m&#7522;, l&#7522;, O&#7522;)</text>

  <rect x="360" y="474" width="300" height="40" rx="7" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  <text x="510" y="499" text-anchor="middle" font-size="13" fill="#1e40af">combine (LSE): rescale by exp(m&#7522; &#8722; M), then &#931;</text>

  <line x1="660" y1="494" x2="708" y2="494" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#ar)"/>
  <rect x="712" y="476" width="108" height="36" rx="7" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="766" y="499" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">attn out</text>

  <rect x="200" y="536" width="620" height="28" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="510" y="555" text-anchor="middle" font-size="12.5" font-weight="600" fill="#15803d">per-block work capped  ·  block count fills the device  ·  −0.6% droop (flat — matches llama.cpp's ~1%)</text>

  <!-- takeaway -->
  <text x="36" y="600" font-size="13" fill="#334155"><tspan font-weight="700">The dial:</tspan> llama.cpp (and now us) cap the keys one block walks and grow the <tspan font-style="italic">block count</tspan> with depth; the old code capped the block count and grew the <tspan font-style="italic">walk</tspan>.</text>
  <text x="36" y="620" font-size="13" fill="#334155">One constant, <tspan font-family="ui-monospace, Consolas, monospace" fill="#475569">SPLIT_KEYS 1024 → 64</tspan> — desktop decode 0.70–0.81× → parity, Orin E4B 1.17× → 1.27×.</text>
</svg>
