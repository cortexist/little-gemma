        <text x="0px" y="0px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13px;fill:rgb(51,65,85);">Matching it means adopting ~1,500 lines of their kernel wholesale — at which point it stops being a teachable, dependency-free runner<tspan x="772.897px 776.509px " y="0px 0px ">. </tspan>So 0.8× is a deliberate trade.</text>
