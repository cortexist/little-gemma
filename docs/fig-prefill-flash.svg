<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="pa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="pad" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect x="6" y="6" width="988" height="588" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="36" y="50" font-size="25" font-weight="700" fill="#0f172a">Prefill flash attention — where the 8× gap forms</text>
  <text x="36" y="76" font-size="13.5" fill="#64748b">A chunk of query rows sweeps the K/V blocks (flash / online softmax). The dataflow is identical on both stacks — the gap is entirely inside the per-block inner step.</text>

  <!-- ===== LEFT: the flash loop (shared dataflow) ===== -->
  <rect x="36" y="100" width="300" height="392" rx="10" fill="#fbfdff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="52" y="126" font-size="12" font-weight="700" fill="#64748b">FLASH LOOP</text>
  <text x="52" y="143" font-size="11" fill="#94a3b8">identical dataflow, both stacks</text>

  <rect x="60" y="154" width="252" height="30" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6"/>
  <text x="186" y="174" text-anchor="middle" font-size="12.5" fill="#15803d">IN: Q tile · B query rows + K/V blocks</text>
  <line x1="186" y1="184" x2="186" y2="200" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#pa)"/>

  <rect x="60" y="202" width="252" height="28" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="186" y="220" text-anchor="middle" font-size="12.5" fill="#334155">load K block</text>
  <line x1="186" y1="230" x2="186" y2="242" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#pa)"/>

  <rect x="60" y="244" width="252" height="28" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="186" y="262" text-anchor="middle" font-size="12.5" fill="#b45309">S = Q · K&#7488;   &#183;  tensor-core MMA</text>
  <line x1="186" y1="272" x2="186" y2="284" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#pa)"/>

  <rect x="60" y="286" width="252" height="28" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="186" y="304" text-anchor="middle" font-size="12.5" fill="#334155">online softmax → running m, l</text>
  <line x1="186" y1="314" x2="186" y2="326" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#pa)"/>

  <rect x="60" y="328" width="252" height="28" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="186" y="346" text-anchor="middle" font-size="12.5" fill="#334155">load V block</text>
  <line x1="186" y1="356" x2="186" y2="368" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#pa)"/>

  <rect x="60" y="370" width="252" height="28" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="186" y="388" text-anchor="middle" font-size="12.5" fill="#b45309">O += P · V   &#183;  tensor-core MMA</text>

  <!-- loop back -->
  <path d="M312,384 C338,384 338,216 315,216" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#pa)"/>
  <text x="322" y="300" font-size="10.5" fill="#94a3b8" transform="rotate(90 322 300)">next K/V block</text>

  <line x1="186" y1="398" x2="186" y2="416" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#pa)"/>
  <rect x="60" y="418" width="252" height="30" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/>
  <text x="186" y="438" text-anchor="middle" font-size="12.5" fill="#1e40af">after last block: normalize O → attn out</text>

  <text x="186" y="474" text-anchor="middle" font-size="11" fill="#94a3b8">the two MMA steps (amber) are the hot path ↓</text>

  <!-- magnifier arrow to the right -->
  <path d="M318,258 C352,258 352,150 384,150" fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#pad)"/>
  <text x="352" y="196" font-size="11" font-weight="600" fill="#7c3aed" transform="rotate(-32 352 196)">zoom in</text>

  <!-- ===== RIGHT: the hot step, two ways ===== -->
  <text x="384" y="120" font-size="12" font-weight="700" fill="#64748b">THE HOT STEP  (load fragments + MMA),  TWO WAYS</text>

  <rect x="384" y="132" width="578" height="112" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  <text x="404" y="157" font-size="15" font-weight="700" fill="#1d4ed8">little-gemma</text>
  <text x="404" y="181" font-size="12.5" fill="#334155">•  manual LDS reads of the A / B fragments from shared memory</text>
  <text x="404" y="201" font-size="12.5" fill="#334155">•  global K / V loads, not pipelined  ·  one query-head per CTA</text>
  <text x="404" y="228" font-size="12.5" font-weight="600" fill="#dc2626">→ stalls on shared-memory reads — at 8 SMs there are no spare warps to hide it</text>

  <rect x="384" y="256" width="578" height="112" rx="9" fill="#fff7ed" stroke="#ea580c" stroke-width="1.8"/>
  <text x="404" y="281" font-size="15" font-weight="700" fill="#c2410c">llama.cpp</text>
  <text x="404" y="305" font-size="12.5" fill="#334155">•  cp.async: global → shared loads, software-pipelined (overlapped)</text>
  <text x="404" y="325" font-size="12.5" fill="#334155">•  ldmatrix.x4: &#188; the fragment-load instructions  ·  GQA pack: 2 heads / CTA</text>
  <text x="404" y="352" font-size="12.5" font-weight="600" fill="#16a34a">→ latency hidden, instruction-lean</text>

  <!-- 8x badge -->
  <circle cx="895" cy="312" r="34" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="895" y="308" text-anchor="middle" font-size="20" font-weight="800" fill="#dc2626">8×</text>
  <text x="895" y="326" text-anchor="middle" font-size="9" fill="#b91c1c">per block</text>

  <!-- ===== verdict bar ===== -->
  <rect x="384" y="392" width="578" height="84" rx="9" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="404" y="418" font-size="13" fill="#334155"><tspan font-weight="700">Same math, same dataflow — the gap is instruction economy in this one step.</tspan></text>
  <text x="404" y="441" font-size="12.5" fill="#475569">Prefill attention: <tspan font-weight="700" fill="#0f172a">0.67 s</tspan> (ours) vs <tspan font-weight="700" fill="#0f172a">0.08 s</tspan> (llama) per 929-token 12B pass on the Orin</text>
  <text x="404" y="461" font-size="12.5" fill="#475569">— ~<tspan font-weight="700" fill="#0f172a">40%</tspan> of the whole 0.8× prefill gap, and the single biggest slice.</text>

  <!-- takeaway strip -->
  <text x="36" y="522" font-size="13" fill="#334155"><tspan font-weight="700">Why we can't just copy it:</tspan> the 8× isn't a parameter — it's how their warps interleave shared-memory reads to hide within-wave latency (codegen).</text>
  <text x="36" y="544" font-size="13" fill="#334155">Matching it means adopting ~1,500 lines of their kernel wholesale — at which point it stops being a teachable, dependency-free runner. So 0.8× is a deliberate trade.</text>
  <text x="36" y="566" font-size="12.5" fill="#64748b">(We took the one graftable slice — GQA head-packing, +1.7%. The rest is structural: barrier cadence + softmax serialization.)</text>
</svg>
